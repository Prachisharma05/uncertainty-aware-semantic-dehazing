seed: 42

data:
  train_pairs: data/NH_HAZE/nh_pairs.txt
  val_pairs: data/NH_HAZE/nh_pairs.txt
  image_size: 256
  batch_size: 2
  num_workers: 0

model:
  in_channels: 3
  out_channels: 3

clip:
  model_name: ViT-B-16
  pretrained: openai
  input_size: 224

loss:
  lambda_l1: 1.0
  lambda_lpips: 0.1
  lambda_clip: 0.02
  lambda_gate: 0.01

optimizer:
  lr: 0.000001

training:
  epochs: 3

checkpoint:
  save_dir: checkpoints/b6_nh

results:
  save_dir: results/b6_nh